<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TechEvent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
  <h2>Sign In</h2>

  <form id="loginForm">
    <div class="input-group">
      <input type="email"
             name="email"
             placeholder="Email"
             required>
    </div>

    <div class="input-group">
      <input type="password"
             name="password"
             placeholder="Password"
             required>
    </div>

    <button type="submit">Login</button>

    <p id="loginMessage"></p>

    <p>
      <a href="forgot-password.html">
        Forgot Password?
      </a>
    </p>

  </form>
</div>

<script src="script.js"></script>

</body>
</html>
