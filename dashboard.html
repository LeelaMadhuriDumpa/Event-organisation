<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Welcome to Your Dashboard</h2>
    <p id="userInfo">Hello, User! 🎉</p>

    <button id="logoutBtn">Logout</button>

    <div id="dashboardMessage"></div>

<div class="details">
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>Phone:</b> <span id="phone"></span></p>
<p><b>Gender:</b> <span id="gender"></span></p>
<p><b>Address:</b> <span id="address"></span></p>
<p><b>Event Type:</b> <span id="eventType"></span></p>
<p><b>Event Date:</b> <span id="eventDate"></span></p>
<p><b>Event Time:</b> <span id="eventTime"></span></p>
</div>

  </div>

  <script src="dashboard.js"></script>
</body>
</html>
